<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Overlapping private circles showing one person shared across multiple audiences">
  <!-- Three overlapping circles -->
  <g fill="none" stroke-width="2">
    <circle cx="170" cy="160" r="110" fill="#6B2C91" fill-opacity="0.08" stroke="#6B2C91" stroke-opacity="0.55"/>
    <circle cx="310" cy="160" r="110" fill="#6B2C91" fill-opacity="0.08" stroke="#6B2C91" stroke-opacity="0.55"/>
    <circle cx="240" cy="260" r="100" fill="#6B2C91" fill-opacity="0.08" stroke="#6B2C91" stroke-opacity="0.55"/>
  </g>

  <!-- Labels -->
  <g font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#4b5563">
    <text x="110" y="68" text-anchor="middle">Family</text>
    <text x="370" y="68" text-anchor="middle">Close friends</text>
    <text x="240" y="348" text-anchor="middle">Coworkers</text>
  </g>

  <!-- Avatars -->
  <g>
    <!-- Only in Family -->
    <circle cx="110" cy="140" r="14" fill="#ffffff" stroke="#6B2C91" stroke-width="2"/>
    <!-- Only in Close friends -->
    <circle cx="370" cy="140" r="14" fill="#ffffff" stroke="#6B2C91" stroke-width="2"/>
    <!-- Only in Coworkers -->
    <circle cx="240" cy="310" r="14" fill="#ffffff" stroke="#6B2C91" stroke-width="2"/>

    <!-- Shared: Family + Close friends -->
    <circle cx="240" cy="140" r="14" fill="#f0d9ff" stroke="#6B2C91" stroke-width="2"/>
    <!-- Shared: Family + Coworkers -->
    <circle cx="180" cy="240" r="14" fill="#f0d9ff" stroke="#6B2C91" stroke-width="2"/>
    <!-- Shared: Close friends + Coworkers -->
    <circle cx="300" cy="240" r="14" fill="#f0d9ff" stroke="#6B2C91" stroke-width="2"/>

    <!-- In all three -->
    <circle cx="240" cy="200" r="16" fill="#6B2C91" stroke="#ffffff" stroke-width="2.5"/>
    <text x="240" y="205" font-family="Inter, sans-serif" font-weight="700" font-size="13" fill="#ffffff" text-anchor="middle">You</text>
  </g>
</svg>
