<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-label="Denazen app mockup showing a public feed next to a private circle feed">
  <defs>
    <linearGradient id="publicBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#faf7fd"/>
    </linearGradient>
    <linearGradient id="privateBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1742"/>
      <stop offset="1" stop-color="#3c0087"/>
    </linearGradient>
    <filter id="phoneShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1a0836" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Back phone (public) -->
  <g filter="url(#phoneShadow)" transform="translate(20 40) rotate(-4 125 240)">
    <rect x="0" y="0" width="250" height="480" rx="36" fill="#111827"/>
    <rect x="8" y="8" width="234" height="464" rx="28" fill="url(#publicBg)"/>
    <rect x="95" y="18" width="60" height="10" rx="5" fill="#111827"/>
    <!-- Public header -->
    <text x="24" y="70" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#6B2C91">PUBLIC</text>
    <text x="24" y="94" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#111827">Your feed</text>
    <!-- Public posts -->
    <g transform="translate(16 120)">
      <rect x="0" y="0" width="218" height="88" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="22" cy="22" r="12" fill="#e5e7eb"/>
      <rect x="42" y="14" width="72" height="8" rx="4" fill="#4b5563"/>
      <rect x="42" y="28" width="44" height="6" rx="3" fill="#9ca3af"/>
      <rect x="16" y="50" width="186" height="6" rx="3" fill="#374151"/>
      <rect x="16" y="62" width="140" height="6" rx="3" fill="#374151"/>
    </g>
    <g transform="translate(16 220)">
      <rect x="0" y="0" width="218" height="88" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="22" cy="22" r="12" fill="#e5e7eb"/>
      <rect x="42" y="14" width="64" height="8" rx="4" fill="#4b5563"/>
      <rect x="42" y="28" width="52" height="6" rx="3" fill="#9ca3af"/>
      <rect x="16" y="50" width="186" height="6" rx="3" fill="#374151"/>
      <rect x="16" y="62" width="120" height="6" rx="3" fill="#374151"/>
    </g>
    <g transform="translate(16 320)">
      <rect x="0" y="0" width="218" height="88" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="22" cy="22" r="12" fill="#e5e7eb"/>
      <rect x="42" y="14" width="80" height="8" rx="4" fill="#4b5563"/>
      <rect x="42" y="28" width="40" height="6" rx="3" fill="#9ca3af"/>
      <rect x="16" y="50" width="186" height="6" rx="3" fill="#374151"/>
      <rect x="16" y="62" width="160" height="6" rx="3" fill="#374151"/>
    </g>
  </g>

  <!-- Front phone (private) -->
  <g filter="url(#phoneShadow)" transform="translate(240 60) rotate(4 125 240)">
    <rect x="0" y="0" width="250" height="480" rx="36" fill="#111827"/>
    <rect x="8" y="8" width="234" height="464" rx="28" fill="url(#privateBg)"/>
    <rect x="95" y="18" width="60" height="10" rx="5" fill="#111827"/>
    <!-- Private header -->
    <g transform="translate(24 64)">
      <!-- Lock icon -->
      <rect x="0" y="6" width="14" height="10" rx="2" fill="#c4a8e8"/>
      <path d="M2 6 V3 a5 5 0 0 1 10 0 V6" fill="none" stroke="#c4a8e8" stroke-width="1.6"/>
    </g>
    <text x="44" y="76" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#c4a8e8">PRIVATE · CLOSE FRIENDS</text>
    <text x="24" y="100" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#ffffff">Circle</text>
    <!-- Private posts -->
    <g transform="translate(16 120)">
      <rect x="0" y="0" width="218" height="88" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="22" cy="22" r="12" fill="#6B2C91"/>
      <rect x="42" y="14" width="72" height="8" rx="4" fill="#e9d9fa"/>
      <rect x="42" y="28" width="44" height="6" rx="3" fill="#a78bcf"/>
      <rect x="16" y="50" width="186" height="6" rx="3" fill="#e9d9fa"/>
      <rect x="16" y="62" width="140" height="6" rx="3" fill="#e9d9fa"/>
    </g>
    <g transform="translate(16 220)">
      <rect x="0" y="0" width="218" height="88" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="22" cy="22" r="12" fill="#6B2C91"/>
      <rect x="42" y="14" width="64" height="8" rx="4" fill="#e9d9fa"/>
      <rect x="42" y="28" width="52" height="6" rx="3" fill="#a78bcf"/>
      <rect x="16" y="50" width="186" height="6" rx="3" fill="#e9d9fa"/>
      <rect x="16" y="62" width="120" height="6" rx="3" fill="#e9d9fa"/>
    </g>
    <g transform="translate(16 320)">
      <rect x="0" y="0" width="218" height="88" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="22" cy="22" r="12" fill="#6B2C91"/>
      <rect x="42" y="14" width="80" height="8" rx="4" fill="#e9d9fa"/>
      <rect x="42" y="28" width="40" height="6" rx="3" fill="#a78bcf"/>
      <rect x="16" y="50" width="186" height="6" rx="3" fill="#e9d9fa"/>
      <rect x="16" y="62" width="160" height="6" rx="3" fill="#e9d9fa"/>
    </g>
  </g>
</svg>
